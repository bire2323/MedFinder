  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
   }

server {
    listen 443 ssl;
    server_name medfinder.com;

    ssl_certificate     /etc/nginx/certs/medfinder.com+3.pem;
    ssl_certificate_key /etc/nginx/certs/medfinder.com+3-key.pem;
      
    location /webhooks/ {
        proxy_pass http://medfinder-rasa:5005/webhooks/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
    }
       # Reverb WebSocket (Proxied internally - stripping /reverb/)
    location /reverb/ {
        proxy_pass http://medfinder-reverb:6001/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # React frontend (public) - Updated for Vite HMR!
    location / {
        proxy_pass http://medfinder-frontend:5173;
        proxy_set_header Host $host;
        
        # ✅ FIX: Important for Vite's own HMR Websocket which runs at '/'
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Laravel backend (proxied internally for CSRF/cookies)
    location /api {
        proxy_pass http://medfinder-backend:80;
        proxy_set_header Host $host;
    }

    location /sanctum {
        proxy_pass http://medfinder-backend:80;
    }

    location /broadcasting {
        proxy_pass http://medfinder-backend:80;
    }
 
# TileServer (vector tiles)
location /tiles/ {
    proxy_pass http://tileserver:8080/;
    proxy_set_header Host $host;
}
}

server {
    listen 80;
    server_name medfinder.com;
    return 301 https://$host$request_uri;
}
