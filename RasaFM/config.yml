# The config recipe.
# https://rasa.com/docs/rasa/model-configuration/
recipe: default.v1

# The assistant project unique identifier
# This default value must be replaced with a unique assistant name within your deployment
assistant_id: 20260303-184441-blazing-tropics

# Configuration for Rasa NLU.
# https://rasa.com/docs/rasa/nlu/components/
language: en # Keep as 'en' even for multilingual; Rasa treats Amharic as text strings

pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: "word"
  - name: CountVectorsFeaturizer
    analyzer: "char_wb"
    min_ngram: 1
    max_ngram: 4
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true # Helps prevent "hallucinating" intents
  - name: EntitySynonymMapper # Crucial for your non-specific DB names
  - name: ResponseSelector
    epochs: 100
  - name: FallbackClassifier
    threshold: 0.3 # If the bot is unsure, it triggers a fallback
