version: "3.1"

intents:
  - affirm
  - bot_challenge
  - deny
  - goodbye
  - greet
  - mood_great
  - mood_unhappy
  - pharmacy_hours
  - search_drug
  - search_pharmacy
  - search_hospital
  - ask_app_usage
  - ask_features
  - ask_developer_info
  - ask_help
  - ask_about_app
  - set_language

entities:
  - drug_name
  - location
  - hospital_name
  - pharmacy_name
  - medical_service
  - language

slots:
  language:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: language

  drug_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: drug_name

  hospital_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: hospital_name

  medical_service:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: medical_service

  pharmacy_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: pharmacy_name

  location:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: location

responses:
  utter_greet:
    - condition:
        - type: slot
          name: language
          value: am
      text: "ሰላም! እንዴት ነህ/ነሽ?"
    - condition:
        - type: slot
          name: language
          value: en
      text: "Hey! How are you?"
    - text: "Hey! How are you?"

  utter_did_that_help:
    - condition:
        - type: slot
          name: language
          value: am
      text: "ይህ ረዳዎት?"
    - condition:
        - type: slot
          name: language
          value: en
      text: "Did that help you?"
    - text: "Did that help you?"

  utter_happy:
    - condition:
        - type: slot
          name: language
          value: am
      text: "በጣም ጥሩ፣ ይቀጥሉ!"
    - condition:
        - type: slot
          name: language
          value: en
      text: "Great, carry on!"
    - text: "Great, carry on!"

  utter_goodbye:
    - condition:
        - type: slot
          name: language
          value: am
      text: "ደህና ሁኑ"
    - condition:
        - type: slot
          name: language
          value: en
      text: "Bye"
    - text: "Bye"

  utter_iamabot:
    - condition:
        - type: slot
          name: language
          value: am
      text: "እኔ በ MedFinder የምሰራ ረዳት ነኝ"
    - condition:
        - type: slot
          name: language
          value: en
      text: "I am a bot, powered by MedFinder."
    - text: "I am a bot, powered by MedFinder."

  utter_searching_hospital:
    - condition:
        - type: slot
          name: language
          value: am
      text: "{location} አካባቢ {hospital_name}ን እየፈለኩ ነው..."
    - condition:
        - type: slot
          name: language
          value: en
      text: "Searching for {hospital_name} in {location}..."
    - text: "Searching for {hospital_name} in {location}..."

  utter_searching_pharmacy:
    - condition:
        - type: slot
          name: language
          value: am
      text: "{location} አካባቢ መድኃኒት ቤቶችን እየፈለኩ ነው..."
    - condition:
        - type: slot
          name: language
          value: en
      text: "Looking for pharmacies in {location}..."
    - text: "Looking for pharmacies in {location}..."

  utter_pharmacy_not_found:
    - condition:
        - type: slot
          name: language
          value: am
      text: "በተጠቀሰው አካባቢ ምንም መድኃኒት ቤት ማግኘት አልቻልኩም።"
    - condition:
        - type: slot
          name: language
          value: en
      text: "I couldn't find any pharmacies in that area."
    - text: "I couldn't find any pharmacies in that area."

  utter_ask_location:
    - condition:
        - type: slot
          name: language
          value: am
      text: "የት አካባቢ ነው የሚፈልጉት?"
    - condition:
        - type: slot
          name: language
          value: en
      text: "Which area or city are you looking in?"
    - text: "Which area or city are you looking in?"

  utter_ask_drug_name:
    - condition:
        - type: slot
          name: language
          value: am
      text: "ምን መድሃኒት ነው የሚፈልጉት?"
    - condition:
        - type: slot
          name: language
          value: en
      text: "What drug are you looking for?"
    - text: "What drug are you looking for?"

  utter_ask_hospital_name:
    - condition:
        - type: slot
          name: language
          value: am
      text: "የት ሆስፒታል ነው የሚፈልጉት?"
    - condition:
        - type: slot
          name: language
          value: en
      text: "What hospital are you looking for?"
    - text: "What hospital are you looking for?"

  utter_app_usage:
    - condition:
        - type: slot
          name: language
          value: am
      text: |
        MedFinderን ለመጠቀም:
          - ሆስፒታሎችን እና መድኃኒት ቤቶችን መፈለግ
          - መድሀኒት እንደሚገኝ ማረጋገጥ
          - በ real time ስፍራዎችን መፈለግ
    - condition:
        - type: slot
          name: language
          value: en
      text: |
        You can use MedFinder to:
          - Find hospitals and pharmacies 
          - Find locations in real time
          - Check drug availability
    - text: "You can use MedFinder to find hospitals, pharmacies, and check drug availability."

  utter_features:
    - condition:
        - type: slot
          name: language
          value: am
      text: |
        ዋና ባህሪዎች:
          - በ real time ስፍራዎችን መፈለግ 
          - ሆስፒታሎችን እና መድኃኒት ቤቶችን መፈለግ
    - condition:
        - type: slot
          name: language
          value: en
      text: |
        Key features:
          - Real-time location-based search
          - Drug availability checking
          - Hospital and pharmacy directory
    - text: "Key features include real-time location search and drug availability checking."

  utter_developer_info:
    - condition:
        - type: slot
          name: language
          value: am
      text: |
        ይህ ስርዓት እንደ ስማርት ሆስፒታሎችን እና መድኃኒት ቤቶችን መፈለግ የሚያስችል መተግበሪያ ነው።
        የተሰራው: በ Birhanu Derso እና የቡድን አባላት ከ UOG CS ትምህርት ክፍል
    - condition:
        - type: slot
          name: language
          value: en
      text: |
        This system was developed as a smart hospital and pharmacy finder project.
        Developed by: Birhanu Derso and team members from UOG CS department
    - text: "Developed by Birhanu Derso and team members from UOG CS department."

  utter_help:
    - condition:
        - type: slot
          name: language
          value: am
      text: |
        እኒህንና የመሳሰሉትን መጠየቅ ይችላሉ፣ ለምሳሌ እንደ:
          - በአካባቢዬ የሚገኝ መድኃኒት ቤት ፈልግ
          - የት መድሃኒት ማግኘት እንደሚችሉ መድሃኒት ስም በማስገባት ይፈልጉ?
    - condition:
        - type: slot
          name: language
          value: en
      text: |
        You can ask me things like:
          - Find a pharmacy near me
          - Search for a hospital in Addis Ababa
          - Check if a drug is available
    - text: "You can ask me to find pharmacies, hospitals, or specific drugs near you."

  utter_about_app:
    - condition:
        - type: slot
          name: language
          value: am
      text: |
        MedFinder ለተጠቃሚዎች ፈጣን የሆነ የሕክምና አገልግሎቶችን መፈለግ የሚያስችል የሕክምና አገልግሎት እና መድሀኒት መፈለጊያ ነው። 
        በአካባቢዎ የሚገኝ መድኃኒት ቤቶችን እና ሆስፒታሎችን መፈለግ የሚያስችል ነው።
    - condition:
        - type: slot
          name: language
          value: en
      text: |
        MedFinder is a smart healthcare assistant that helps users locate medical services quickly by finding pharmacies and hospitals in your area.
    - text: "MedFinder is a smart healthcare assistant to help locate pharmacies and hospitals."

actions:
  - action_set_language
  - action_search_drugs
  - action_search_pharmacy
  - action_search_hospital