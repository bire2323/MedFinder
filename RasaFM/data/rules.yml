version: "3.1"

rules:

  # ==================== LANGUAGE ====================
  - rule: Handle language setting
    steps:
      - intent: set_language
      - action: action_set_language

  # ==================== GREETINGS & SMALL TALK ====================
  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  # ==================== INFORMATIONAL ====================
  - rule: Features
    steps:
      - intent: ask_features
      - action: utter_features

  - rule: Developer info
    steps:
      - intent: ask_developer_info
      - action: utter_developer_info

  - rule: Explain app purpose
    steps:
      - intent: ask_about_app
      - action: utter_about_app

  - rule: List capabilities
    steps:
      - intent: ask_capabilities
      - action: utter_capabilities

  - rule: Explain chatbot vs app
    steps:
      - intent: ask_difference_chatbot_vs_app
      - action: utter_chatbot_advantage

  # ==================== SEARCH TASKS (Custom Actions) ====================
  - rule: Trigger drug search
    steps:
      - intent: search_drug
      - action: action_search_drugs

  - rule: Trigger pharmacy search
    steps:
      - intent: search_pharmacy
      - action: action_search_pharmacy

  - rule: Trigger hospital search
    steps:
      - intent: search_hospital
      - action: action_search_hospital
  - rule: Explain system purpose
    steps:
      - intent: ask_system_purpose
      - action: utter_system_purpose

  - rule: How to find a drug
    steps:
      - intent: ask_how_to_find_drug
      - action: utter_how_to_find_drug

  - rule: Provide help
    steps:
      - intent: ask_help
      - action: utter_help