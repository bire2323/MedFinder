version: "3.1"

stories:
  - story: happy path
    steps:
      - intent: greet
      - action: utter_greet
      - intent: mood_great
      - action: utter_happy

  - story: drug search path
    steps:
      - intent: search_drug
      - action: action_search_drugs
      - intent: affirm
      - action: utter_happy

  - story: sad path with recovery
    steps:
      - intent: greet
      - action: utter_greet
      - intent: mood_unhappy
      - action: utter_help  # Offer help instead of just asking if it helped
      - intent: search_pharmacy
      - action: action_search_pharmacy

  - story: user denies help
    steps:
      - intent: mood_unhappy
      - action: utter_did_that_help
      - intent: deny
      - action: utter_goodbye
